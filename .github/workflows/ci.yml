name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (backend)
        run: pnpm typecheck

      - name: Typecheck (UI)
        run: pnpm typecheck:ui

      - name: Lint (backend)
        run: pnpm lint:check

      - name: Lint (UI)
        run: pnpm lint:ui

      - name: Test (backend)
        run: pnpm test

      - name: Build UI
        run: pnpm build:ui
