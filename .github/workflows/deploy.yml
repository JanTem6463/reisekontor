name: deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd ~/reisekontor
            # SSH-Config (~/.ssh/config "Host github-reisekontor") leitet
            # github.com auf einen eigenen Deploy-Key — git muss diesen Host
            # nutzen, weil der finanz-app-Deploy-Key nicht geteilt werden kann.
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker/docker-compose.prod.yaml up -d --build
            docker compose -f docker/docker-compose.prod.yaml ps
