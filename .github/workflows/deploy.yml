name: deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd ~/reisekontor
            # SSH-Config (~/.ssh/config "Host github-reisekontor") leitet
            # github.com auf einen eigenen Deploy-Key — git muss diesen Host
            # nutzen, weil der finanz-app-Deploy-Key nicht geteilt werden kann.
            git fetch origin main
            git reset --hard origin/main

            # HUB_PUBLIC_KEY aus finanz-app .env.prod uebernehmen (jans-hub
            # Bootstrap schreibt ihn dort primaer). Idempotent.
            HUB_LINE=$(grep "^HUB_PUBLIC_KEY=" ~/Finanz-App/deploy/.env.prod || echo "")
            if [ -n "$HUB_LINE" ]; then
              touch ~/reisekontor/.env
              sed -i "/^HUB_PUBLIC_KEY=/d" ~/reisekontor/.env
              printf "%s\n" "$HUB_LINE" >> ~/reisekontor/.env
              echo "HUB_PUBLIC_KEY synced from finanz-app .env.prod"
            else
              echo "WARN: HUB_PUBLIC_KEY not found in finanz-app .env.prod — /sso will be disabled"
            fi

            docker compose -f docker/docker-compose.prod.yaml up -d --build
            docker compose -f docker/docker-compose.prod.yaml ps
